<label>Nome do produto</label>
<input type="text" name="nome" value="{{ form.get('nome') if form else (produto.nome if produto else '') }}" required>

<label>Categoria</label>
<select name="categoria_id" required>
    <option value="">Selecione</option>
    {% for categoria in categorias %}
        {% set categoria_atual = form.get('categoria_id') if form else (produto.categoria_id|string if produto else '') %}
        <option value="{{ categoria.id }}" {% if categoria_atual == categoria.id|string %}selected{% endif %}>
            {{ categoria.nome }}
        </option>
    {% endfor %}
</select>
<a class="link-extra" href="{{ url_for('nova_categoria') }}">Cadastrar nova categoria</a>

<label>Codigo de barras</label>
<input type="text" name="codigo_barras" value="{{ form.get('codigo_barras') if form else (produto.codigo_barras if produto else '') }}" placeholder="Bipe ou digite o codigo">

<label>Unidade de medida</label>
<select name="unidade_medida" required>
    {% set unidade_atual = form.get('unidade_medida') if form else (produto.unidade_medida if produto and produto.unidade_medida else 'unidade') %}
    <option value="unidade" {% if unidade_atual == 'unidade' %}selected{% endif %}>Unidade</option>
    <option value="caixa" {% if unidade_atual == 'caixa' %}selected{% endif %}>Caixa</option>
    <option value="pacote" {% if unidade_atual == 'pacote' %}selected{% endif %}>Pacote</option>
    <option value="frasco" {% if unidade_atual == 'frasco' %}selected{% endif %}>Frasco</option>
    <option value="ampola" {% if unidade_atual == 'ampola' %}selected{% endif %}>Ampola</option>
    <option value="ml" {% if unidade_atual == 'ml' %}selected{% endif %}>ML</option>
</select>

<label>Observacoes</label>
<textarea name="observacoes">{{ form.get('observacoes') if form else (produto.observacoes if produto and produto.observacoes else '') }}</textarea>
